<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Neumorphic Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="clock-container" id="clockContainer">
        <h1 class="clock-title">NEUMORPHIC CLOCK ⏰</h1>
        
        <div class="clock">
            <div class="numbers-container"></div>
            
            <div class="ticks-container"></div>

            <div class="hand hour-hand" id="hourHand"></div>
            <div class="hand min-hand" id="minHand"></div>
            <div class="hand sec-hand" id="secHand"></div>
            
            <div class="center-pin"></div>
            
            <div class="bottom-dial">
                <div class="play-icon"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
